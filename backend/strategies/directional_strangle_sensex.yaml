# DirectionalStrangle — SENSEX (paper-first).
#
# Backtest result (2024-01-01 to 2026-06-25, ~2.5yr — earliest options data):
#   Net +Rs 24.3L | PF 6.44 | Win 70% | MaxDD Rs 55K
# Best PF of the three indices; limited history (SENSEX weekly options since 2024).
# Same bias weights and ratio table as NIFTY/BANKNIFTY (robust across indices).
#
# SENSEX-specific: lot=20, strike_step=100, option_segment=BSE_FNO, roll_target=60.

id: directional_strangle_sensex
class: pdp.strategies.directional_strangle.DirectionalStrangle

watchlist:
  - security_id: "51"       # SENSEX index (Dhan IDX_I)
    exchange_segment: IDX_I
    timeframes: [5m, 15m, 30m, 1H, 1D]
    indicators:
      - family: ema
        periods: [9, 20, 50, 100]
      - family: supertrend
        period: 10
        multiplier: 2.0
      - family: psar
      - family: vwap
      - family: pivots
      - family: period_levels

params:
  # ---- Instrument ----
  underlying: SENSEX
  underlying_security_id: "51"   # spot feed (IDX_I)
  index_segment: IDX_I
  option_segment: BSE_FNO        # SENSEX options trade on BSE
  vix_security_id: "21"          # India VIX

  # ---- Lot / strike ----
  lot_size: 20                   # 2025+ SENSEX lot size
  strike_step: 100
  otm_steps: 2

  # ---- Sizing ----
  scale_lots: 2

  # ---- Ratio table (PE:CE per bucket, before scale_lots) ----
  ratio_table:
    complete_bull: [5, 0]
    most_bull:     [4, 2]
    more_bull:     [3, 2]
    neutral:       [3, 3]
    more_bear:     [2, 3]
    most_bear:     [2, 4]
    complete_bear: [0, 5]

  # ---- Exits ----
  take_profit_pct: 0.5
  pct_stop_half: 0.30
  pct_stop_all: 0.40

  # ---- Rollup ----
  roll_trigger_prem: 25.0
  roll_target_min_prem: 60.0

  # ---- Protective hedge (Rs 2–8 band) ----
  hedge_enabled: true
  hedge_prem_min: 2.0
  hedge_prem_max: 8.0
  hedge_scan_start: 8
  hedge_scan_end: 22

  # ---- Momentum long (disabled) ----
  momentum_enabled: false
  momentum_premium_target: 50000
  momentum_score_threshold: 0.5

  # ---- VIX gate (disabled) ----
  vix_gate_enabled: false

  # ---- Session windows ----
  entry_after_ist: "10:15"
  squareoff_ist: "15:10"

  # ---- DTE window: open new legs only within N calendar days of expiry ----
  dte_max: 15

  # ---- Day loss cap ----
  day_loss_limit: 50000
  neutral_no_trade: false

  # ---- Bias weights (same trend-weighted config as NIFTY/BANKNIFTY) ----
  w_ema_1h: 2.5
  w_ema_15m: 2.0
  w_ema_5m: 1.5
  w_cam_daily: 1.0
  w_cam_weekly: 1.0
  w_swing: 1.0
  w_orb: 1.0
  w_pcr: 1.0
  th_complete: 0.85
  th_most: 0.60
  th_more: 0.30

risk:
  max_open_orders: 30
  max_daily_loss_inr: 50000
