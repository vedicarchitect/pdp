# DirectionalStrangle — NIFTY (paper-first).
#
# Backtest result (2021-09-01 to 2026-06-25, 5yr):
#   Net +Rs 85.6L | PF 5.72 | Win 74% | MaxDD Rs 71K
# Walk-forward 7/7 OOS folds positive (PF 1.47 OOS).
# Config: tren/cons/tp0.5/H, scale×2, hedge Rs 2–5 band.
#
# momentum_enabled: false — 5yr data shows momentum adds noise without edge.
# vix_gate_enabled: false — 5yr data shows gate costs Rs 33L + increases MaxDD.

id: directional_strangle_nifty
class: pdp.strategies.directional_strangle.DirectionalStrangle

watchlist:
  - security_id: "13"       # NIFTY index (Dhan IDX_I)
    exchange_segment: IDX_I
    timeframes: [5m, 15m, 1h]
    indicators:
      - family: ema
        periods: [9, 20, 50]
      - family: vwap
      - family: pivots
      - family: period_levels

params:
  # ---- Instrument ----
  underlying: NIFTY
  underlying_security_id: "13"   # spot feed (IDX_I)
  index_segment: IDX_I
  option_segment: NSE_FNO
  vix_security_id: "21"          # India VIX
  # futures_security_id: null    # Set to front-month NIFTY futures Dhan SID for VWAP (update monthly)

  # ---- Lot / strike ----
  lot_size: 65                   # Jan 2026+ NIFTY lot size
  strike_step: 50
  otm_steps: 2

  # ---- Sizing ----
  scale_lots: 2

  # ---- Ratio table (PE:CE per bucket, before scale_lots) ----
  ratio_table:
    complete_bull: [5, 0]
    most_bull:     [4, 2]
    more_bull:     [3, 2]
    neutral:       [3, 3]
    more_bear:     [2, 3]
    most_bear:     [2, 4]
    complete_bear: [0, 5]

  # ---- Exits ----
  take_profit_pct: 0.5
  pct_stop_half: 0.30
  pct_stop_all: 0.40

  # ---- Rollup ----
  roll_trigger_prem: 20.0
  roll_target_min_prem: 50.0

  # ---- Protective hedge (Rs 2–5 band, far-OTM wing) ----
  hedge_enabled: true
  hedge_prem_min: 2.0
  hedge_prem_max: 5.0
  hedge_scan_start: 10
  hedge_scan_end: 22

  # ---- Momentum long (disabled — no edge in 5yr data) ----
  momentum_enabled: false
  momentum_premium_target: 50000
  momentum_score_threshold: 0.5

  # ---- VIX gate (disabled — costs Rs 33L over 5yr) ----
  vix_gate_enabled: false

  # ---- Session windows ----
  entry_after_ist: "10:15"
  squareoff_ist: "15:10"

  # ---- Day loss cap ----
  day_loss_limit: 50000
  neutral_no_trade: false

  # ---- Bias weights (trend-weighted / conservative thresholds) ----
  w_ema_1h: 2.5
  w_ema_15m: 2.0
  w_ema_5m: 1.5
  w_cam_daily: 1.0
  w_cam_weekly: 1.0
  w_swing: 1.0
  w_vwap: 1.0
  w_orb: 1.0
  w_pcr: 1.0
  th_complete: 0.85
  th_most: 0.60
  th_more: 0.30

risk:
  max_open_orders: 30
  max_daily_loss_inr: 50000
