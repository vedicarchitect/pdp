# Pinned project name so the named volumes (pdp_postgres_data / pdp_redis_data /
# pdp_mongo_data) stay stable regardless of this file's directory. Do NOT change —
# changing it orphans existing DB data.
name: pdp

services:
  postgres:
    image: postgres:16
    container_name: pdp-postgres
    environment:
      POSTGRES_USER: pdp
      POSTGRES_PASSWORD: pdp
      POSTGRES_DB: pdp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdp -d pdp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pdp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: pdp-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: pdp-opensearch
    environment:
      # Single-node dev cluster, security plugin disabled (local only — enable + TLS in AWS).
      discovery.type: single-node
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: pdp-opensearch-dashboards
    profiles: ["tools"]
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pdp-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@pdp.local
      PGADMIN_DEFAULT_PASSWORD: pdp
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  opensearch_data:
