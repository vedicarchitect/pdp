# Pinned project name so the named volumes (pdp_postgres_data / pdp_redis_data /
# pdp_mongo_data) stay stable regardless of this file's directory. Do NOT change —
# changing it orphans existing DB data.
name: pdp

services:
  postgres:
    image: postgres:16
    container_name: pdp-postgres
    # Resource caps (host = 8 CPU / 7.22 GB). These are limits, not reservations — a
    # spike in one service can no longer starve the host, the app, or another container's
    # healthcheck. Postgres (orders/trades ledger) is light here.
    mem_limit: 1g
    environment:
      POSTGRES_USER: pdp
      POSTGRES_PASSWORD: pdp
      POSTGRES_DB: pdp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdp -d pdp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pdp-redis
    mem_limit: 768m
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # maxmemory bounds the hot cache / pub-sub; LTP keys carry short TTLs so allkeys-lru
    # only ever evicts genuinely cold data well before the cap is reached.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: pdp-mongo
    # CPU cap (4 of 8 cores) so a market_bars write burst can never peg the whole host and
    # starve the trading process; mem cap + an explicit WiredTiger cache size stop Mongo
    # sizing its cache to the full host RAM (the default) and thrashing eviction under
    # pressure. Data is on the named volume, safe across container recreation.
    cpus: 4.0
    mem_limit: 3g
    command: ["--wiredTigerCacheSizeGB", "1.5"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # Relaxed from 5s/3s: the check spawns a full mongosh each run, and under a CPU burst a
    # 3s timeout with no start_period made the check itself time out → false `unhealthy`
    # flapping. 30s/10s with a 60s grace reflects real liveness without adding load.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: pdp-opensearch
    # Heap is already fixed at -Xmx512m below; this caps the uncapped off-heap footprint
    # (Lucene mmap / page cache) so OpenSearch can't balloon under the host either.
    mem_limit: 1.5g
    environment:
      # Single-node dev cluster, security plugin disabled (local only — enable + TLS in AWS).
      discovery.type: single-node
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # PA agent is a separate always-on process the docker image starts by default —
      # continuous idle CPU cost with zero dev value here.
      DISABLE_PERFORMANCE_ANALYZER_AGENT_CLI: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: pdp-opensearch-dashboards
    profiles: ["tools"]
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pdp-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@pdp.local
      PGADMIN_DEFAULT_PASSWORD: pdp
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # --- App services (api-worker-decoupling) ---------------------------------
  # One image (backend/Dockerfile), three roles selected via PDP_ROLE + command.
  # Behind the "app" profile so plain `task db:up` / `docker compose up` (infra only)
  # is unaffected, and so `api`'s 8000:8000 mapping never fights `task dev`'s host
  # uvicorn on the same port. Run with: `docker compose --profile app up -d --build`.
  # env_file supplies shared/secret settings (e.g. DHAN_CLIENT_ID); the `environment:`
  # block below overrides DATABASE_URL/REDIS_URL/MONGO_URI because backend/.env points
  # at host-mapped `localhost` ports, which don't resolve inside the compose network —
  # containers must address the other services by their compose service name instead.
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: pdp:latest
    container_name: pdp-api
    profiles: ["app"]
    command: ["pdp-api"]
    env_file:
      - ../../backend/.env
    environment:
      PDP_ROLE: api
      DATABASE_URL: postgresql+asyncpg://pdp:pdp@postgres:5432/pdp
      DATABASE_SYNC_URL: postgresql+psycopg://pdp:pdp@postgres:5432/pdp
      REDIS_URL: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017
      OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10

  engine:
    image: pdp:latest
    container_name: pdp-engine
    profiles: ["app"]
    command: ["pdp-engine"]
    env_file:
      - ../../backend/.env
    environment:
      PDP_ROLE: engine
      DATABASE_URL: postgresql+asyncpg://pdp:pdp@postgres:5432/pdp
      DATABASE_SYNC_URL: postgresql+psycopg://pdp:pdp@postgres:5432/pdp
      REDIS_URL: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10

  ops:
    image: pdp:latest
    container_name: pdp-ops
    profiles: ["app"]
    command: ["pdp-ops"]
    env_file:
      - ../../backend/.env
    environment:
      PDP_ROLE: ops
      DATABASE_URL: postgresql+asyncpg://pdp:pdp@postgres:5432/pdp
      DATABASE_SYNC_URL: postgresql+psycopg://pdp:pdp@postgres:5432/pdp
      REDIS_URL: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017
      OPENSEARCH_URL: http://opensearch:9200
      INTEL_ENABLED: "true"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  opensearch_data:
